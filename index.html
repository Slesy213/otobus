<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Slesy Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    /* Arka plan video */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Karartma */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      z-index: -1;
    }

    /* Yazı */
    .content {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }

    .gecmis-yazi {
      color: red;
      font-size: 22px;
      font-weight: bold;
      text-shadow:
        0 0 5px red,
        0 0 10px red,
        0 0 20px darkred,
        0 0 40px red;
      animation: pulseRed 1.5s infinite ease-in-out;
      letter-spacing: 1px;
    }

    @keyframes pulseRed {
      0% {
        transform: scale(1);
        opacity: 0.85;
        text-shadow:
          0 0 5px red,
          0 0 10px red,
          0 0 20px darkred;
      }
      50% {
        transform: scale(1.08);
        opacity: 1;
        text-shadow:
          0 0 10px red,
          0 0 20px red,
          0 0 35px crimson,
          0 0 50px darkred;
      }
      100% {
        transform: scale(1);
        opacity: 0.85;
        text-shadow:
          0 0 5px red,
          0 0 10px red,
          0 0 20px darkred;
      }
    }
  </style>
</head>

<body>

  <!-- Video -->
  <video autoplay muted loop id="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- Karartma -->
  <div class="overlay"></div>

  <!-- Müzik -->
  <audio autoplay loop id="music">
    <source src="sarkı.mp3" type="audio/mpeg">
  </audio>

  <!-- Yazı -->
  <div class="content">
    <div class="gecmis-yazi">Gecmis Olsun Gardas</div>
  </div>

  <script>
    document.addEventListener("click", () => {
      const music = document.getElementById("music");
      music.play();
    });
  </script>

</body>
</html>
