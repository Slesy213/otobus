<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Slesy Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* 🎥 ARKA PLAN VIDEO */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* 🌑 KARARTMA (daha şık görünür) */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    /* ✨ ORTA YAZI */
    .content {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      top: 40%;
      font-size: 40px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- 🎥 Video -->
  <video autoplay muted loop id="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- 🌑 Overlay -->
  <div class="overlay"></div>

  <!-- 🎵 Müzik -->
  <audio autoplay loop id="music">
    <source src="sarkı.mp3" type="audio/mpeg">
  </audio>

  <!-- ✨ Yazı -->
  <div class="content">
    SLESY 🔥
  </div>

  <script>
    // Bazı tarayıcılar otomatik müziği engeller, tıklayınca başlatır
    document.addEventListener("click", () => {
      const music = document.getElementById("music");
      music.play();
    });
  </script>

</body>
</html>
