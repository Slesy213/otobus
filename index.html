<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Slesy Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      flex-direction: column;
      gap: 14px;
    }

    .gecmis-yazi {
      color: red;
      font-size: 22px;
      font-weight: bold;
      text-shadow:
        0 0 5px red,
        0 0 10px red,
        0 0 20px darkred,
        0 0 40px red;
      animation: pulseRed 1.5s infinite ease-in-out;
      letter-spacing: 1px;
    }

    .alt-yazi {
      color: #ff2a2a;
      font-size: 14px;
      font-weight: bold;
      text-shadow:
        0 0 4px red,
        0 0 8px crimson,
        0 0 18px darkred;
      animation: blinkText 1.2s infinite alternate;
      letter-spacing: 1px;
    }

    @keyframes pulseRed {
      0% {
        transform: scale(1);
        opacity: 0.85;
        text-shadow:
          0 0 5px red,
          0 0 10px red,
          0 0 20px darkred;
      }
      50% {
        transform: scale(1.08);
        opacity: 1;
        text-shadow:
          0 0 10px red,
          0 0 20px red,
          0 0 35px crimson,
          0 0 50px darkred;
      }
      100% {
        transform: scale(1);
        opacity: 0.85;
        text-shadow:
          0 0 5px red,
          0 0 10px red,
          0 0 20px darkred;
      }
    }

    @keyframes blinkText {
      from {
        opacity: 0.55;
        transform: scale(1);
      }
      to {
        opacity: 1;
        transform: scale(1.06);
      }
    }
  </style>
</head>
<body>

  <video autoplay muted loop id="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <audio autoplay loop id="music">
    <source src="sarkı.mp3" type="audio/mpeg">
  </audio>

  <div class="content">
    <div class="gecmis-yazi">Gecmis Olsun Gardas</div>
    <div class="alt-yazi">Benden Kurtulamazsın (Slesy)</div>
  </div>

  <script>
    document.addEventListener("click", () => {
      const music = document.getElementById("music");
      music.play().catch(() => {});
    });

    window.addEventListener("beforeunload", function (e) {
      e.preventDefault();
      e.returnValue = "";
    });
  </script>

</body>
</html>
